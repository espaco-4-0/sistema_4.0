receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  attributes:
    actions:
      - key: "http.request.header.authorization"
        action: delete
      - key: "http.request.header.cookie"
        action: delete
      - key: next_route
        from_attribute: http.route
        action: upsert 

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
  otlp/tempo:
    endpoint: "http://tempo:4317"
    tls:
      insecure: true
  otlp_http/loki:
    endpoint: "http://loki:3100/otlp"
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki, debug]
